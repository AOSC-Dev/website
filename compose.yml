services:
  website:
    build:
      context: .
    ports:
      - "3000:3000"

  meilisearch:
    image: getmeili/meilisearch
    ports:
      - 7700:7700
    # environment:
    #   - MEILI_MASTER_KEY=MEILI_DEBUG_MASTER_KEY
    deploy:
      resources:
        limits:
          memory: 768M
    network_mode: "service:website"
